name: unblink

services:
  unblink:
    container_name: unblink-app
    build:
      context: .
    image: unblink:local
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CONFIG_DIR=/data/unblink
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${VITE_SERVER_API_PORT:-8090}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - unblink-data:/data/unblink

volumes:
  unblink-data:
